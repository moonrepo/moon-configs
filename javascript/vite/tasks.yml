$schema: 'https://moonrepo.dev/schemas/tasks.json'

fileGroups:
  vite:
    - 'public/**/*'
    - 'src/**/*'
    - 'vite.config.*'
  sources: []
  tests:
    - 'tests/**/*'

tasks:
  # Build the application
  build:
    command: 'vite build'
    inputs:
      - '@group(vite)'
      - '@group(sources)'
    outputs:
      - 'dist'

  # Run the development server
  dev:
    command: 'vite dev'
    preset: 'server'

  # Optimize dependencies
  optimize:
    command: 'vite optimize'
    options:
      runInCI: false

  # Preview the built application
  preview:
    command: 'vite preview'
    deps:
      - 'build'
    preset: 'server'
