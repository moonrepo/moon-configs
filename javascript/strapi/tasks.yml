$schema: 'https://moonrepo.dev/schemas/tasks.json'

fileGroups:
  sources:
    - 'config/*'
    - 'database/**/*'
    - 'scripts/**/*'
    - 'src/**/*'
  assets:
    - 'data/**/*'
    - 'public/**/*'
    - 'favicon.png'
  tests: []

tasks:
  # Catch-all for any `strapi` command
  strapi:
    command: strapi
    options:
      runInCI: false

  # Start Strapi in watch mode. (Changes in Strapi project files will trigger a server restart)
  dev:
    command: strapi develop
    preset: 'server'

  # Start Strapi without watch mode.
  start:
    command: strapi start
    preset: 'server'
    deps:
      - 'build'

  # Build Strapi admin panel.
  build:
    command: strapi build
    inputs:
      - '@group(sources)'
    outputs:
      - 'dist'

  # Deploy Strapi project.
  deploy:
    command: strapi deploy
    options:
      runInCI: false

  # Run Strapi console
  console:
    command: strapi console
    options:
      runInCI: false

  admin-create:
    command: strapi admin:create
    options:
      runInCI: false

  admin-reset-password:
    command: strapi admin:reset-password
    options:
      runInCI: false

  components:
    command: strapi components:list
    options:
      runInCI: false

  config-dump:
    command: strapi config:dump
    options:
      runInCI: false

  config-restore:
    command: strapi config:restore
    options:
      runInCI: false

  content-types:
    command: strapi content-types:list

  controllers:
    command: strapi controllers:list

  generate:
    command: strapi generate
    options:
      runInCI: false
      interactive: true

  hooks:
    command: strapi hooks:list

  middlewares:
    command: strapi middlewares:list

  policies:
    command: strapi policies:list

  report:
    command: strapi report
    options:
      runInCI: false

  routes:
    command: strapi routes:list

  services:
    command: strapi services:list

  telemetry-disable:
    command: strapi telemetry:disable
    options:
      runInCI: false

  telemetry-enable:
    command: strapi telemetry:enable
    options:
      runInCI: false

  templates-generate:
    command: strapi templates:generate
    options:
      runInCI: false
      interactive: true

  ts-generate-types:
    command: strapi ts:generate-types
    options:
      runInCI: false

  export:
    command: strapi export
    outputs:
      - 'exported-data'

  import:
    command: strapi import

  transfer:
    command: strapi transfer
    options:
      runInCI: false
      interactive: true

  link:
    command: strapi link
    options:
      runInCI: false
      interactive: true

  login:
    command: strapi login
    options:
      runInCI: false
      interactive: true

  logout:
    command: strapi logout
    options:
      runInCI: false

  cloud:
    command: strapi cloud
    options:
      runInCI: false
      interactive: true

  projects:
    command: strapi projects
    options:
      runInCI: false

  help:
    command: strapi help
    options:
      runInCI: false
