$schema: 'https://moonrepo.dev/schemas/tasks.json'

fileGroups:
  sources:
    - 'src/**/*'
    - 'medusa-config.(js|ts)'
    - 'instrumentation.(js|ts)'
  tests:
    - 'integration-tests/**/*'

tasks:
  # Catch-all for any `medusa` command
  medusa:
    command: 'medusa'
    options:
      runInCI: false

  # Build the application
  build:
    command: 'medusa build'
    inputs:
      - '@group(sources)'
    outputs:
      - '.medusa'

  # Run the development server
  dev:
    command: 'medusa develop'
    preset: 'server'

  # Serve the built application
  start:
    command: 'medusa start'
    deps:
      - 'build'
    preset: 'server'

  # run medusa scripts
  exec:
    command: 'medusa exec'
    options:
      runInCI: false

  # Initialize the database
  db-init:
    command: 'medusa db:setup'
    options:
      runInCI: false
      interactive: true

  # create a database
  db-create:
    command: 'medusa db:create'
    options:
      runInCI: false

  # migrate the database
  db-migrate:
    command: 'medusa db:migrate'
    options:
      runInCI: false

  # migrate the database
  db-generate:
    command: 'medusa db:generate'
    options:
      runInCI: false

  # create a admin user
  add-admin:
    command: 'medusa user'
    options:
      runInCI: false

  # Disable telemetry
  disable-telemetry:
    command: 'medusa telemetry --disable'
    options:
      runInCI: false
