$schema: 'https://moonrepo.dev/schemas/tasks.json'

fileGroups:
  shadcn:
    - 'src/**/*'
    - components.json
  sources: []
  tests: []

tasks:
  # Catch-all for any `shadcn` command
  shadcn:
    command: 'shadcn'
    options:
      runInCI: false

  init:
    command: 'shadcn init'
    options:
      runInCI: false

  add:
    command: 'shadcn add'
    options:
      runInCI: false

  diff:
    command: 'shadcn diff'
    options:
      runInCI: false

  migrate:
    command: 'shadcn migrate'
    options:
      runInCI: false

  info:
    command: 'shadcn info'
    options:
      runInCI: false

  build:
    command: 'shadcn build'
    options:
      runInCI: false

  registry-build:
    command: 'shadcn registry:build'
    options:
      runInCI: false

  registry-mcp:
    command: 'shadcn registry:mcp'
    options:
      runInCI: false
